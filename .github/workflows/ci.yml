name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build --build-tests

      - name: Test
        # Integration tests are gated behind HONEYCRISP_INTEGRATION and need
        # real TCC grants, so they stay out of CI. This runs the rest.
        run: swift test
