name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Keyless job: runs semantic-release (and its npm dependency tree) where no
  # signing key exists. It analyzes commits, writes release notes, creates a
  # draft release and the tag, and outputs the computed version.
  release:
    name: Decide version and draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.semantic.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # Signing job: has the secrets but installs no third-party node code. Builds,
  # notarizes, Sparkle-signs, uploads the assets, then publishes the draft.
  publish:
    name: Build, notarize, and publish
    needs: release
    if: needs.release.outputs.version != ''
    runs-on: macos-26
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.release.outputs.version }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_APP_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/honeycrisp.keychain-db"
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          # Pass the full common name, not the hash: package-app.swift keys the
          # notarized path off the identity containing "Developer ID".
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "HONEYCRISP_SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          rm "$RUNNER_TEMP/cert.p12"

      - name: Stage notarization and Sparkle keys
        env:
          NOTARY_KEY_BASE64: ${{ secrets.NOTARYTOOL_KEY_BASE64 }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          echo "NOTARYTOOL_KEY_PATH=$RUNNER_TEMP/notary.p8" >> "$GITHUB_ENV"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_key"
          echo "SPARKLE_PRIVATE_KEY_PATH=$RUNNER_TEMP/sparkle_key" >> "$GITHUB_ENV"

      - name: Build, sign, and notarize
        env:
          NOTARYTOOL_KEY_ID: ${{ secrets.NOTARYTOOL_KEY_ID }}
          NOTARYTOOL_ISSUER_ID: ${{ secrets.NOTARYTOOL_ISSUER_ID }}
        run: HONEYCRISP_VERSION="$VERSION" swift scripts/package-app.swift

      - name: Make the release archive, appcast, and checksum
        # sign_update comes from the SwiftPM-verified Sparkle artifact resolved
        # by the build above; nothing is downloaded.
        run: HONEYCRISP_VERSION="$VERSION" swift scripts/make-release.swift

      - name: Upload assets and publish the release
        run: |
          set -euo pipefail
          gh release upload "v$VERSION" \
            "dist/Honeycrisp-$VERSION.zip" \
            "dist/Honeycrisp-$VERSION.zip.sha256" \
            "dist/appcast.xml" --clobber
          gh release edit "v$VERSION" --draft=false --latest

      - name: Shred keys and keychain
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/notary.p8" "$RUNNER_TEMP/sparkle_key"
          security delete-keychain "$KEYCHAIN" 2>/dev/null || true
